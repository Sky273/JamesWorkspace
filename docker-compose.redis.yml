services:
  redis:
    image: redis:7-alpine
    container_name: resumeconverter-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data

  app:
    image: resumeconverter:latest
    container_name: resumeconverter-app
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - ./.env.docker
    ports:
      - "443:3443"
      - "3443:3443"
      - "5433:5432"
    volumes:
      - ./data/postgresql:/var/lib/postgresql/18/main
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    environment:
      CACHE_BACKEND: redis
      CACHE_REDIS_URL: redis://redis:6379
      CACHE_KEY_PREFIX: resumeconverter
      DISABLE_INTERNAL_REDIS: "true"
