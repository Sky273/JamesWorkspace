name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'codex/**'
  pull_request:

env:
  POSTGRES_HOST: 127.0.0.1
  POSTGRES_PORT: 5432
  POSTGRES_DB: resumeconverter
  POSTGRES_USER: resume_user
  POSTGRES_PASSWORD: test-password
  POSTGRES_SSL: 'false'
  JWT_SECRET: ci-jwt-secret-minimum-32-characters
  CSRF_SECRET: ci-csrf-secret-minimum-32-characters
  REFRESH_TOKEN_SECRET: ci-refresh-secret-minimum-32-characters
  PDF_SERVER_INTERNAL_TOKEN: ci-pdf-secret-minimum-32-characters
  OPENAI_API_KEY: test-openai-key
  ANTHROPIC_API_KEY: test-anthropic-key
  CACHE_BACKEND: memory
  E2E_QUIET_EXPECTED_WARNINGS: 'true'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_OPTIONS: --disable-warning=DEP0040

jobs:
  validate-core:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: resumeconverter
          POSTGRES_USER: resume_user
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U resume_user -d resumeconverter"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run migrate

      - name: Validate core suite
        run: npm run validate:core

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-core
          path: |
            test-results/validation-summary-core.json
            logs/**
          if-no-files-found: ignore
          retention-days: 14

  validate-e2e:
    runs-on: ubuntu-latest
    needs: validate-core
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: resumeconverter
          POSTGRES_USER: resume_user
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U resume_user -d resumeconverter"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run database migrations
        run: npm run migrate

      - name: Validate e2e suite
        run: npm run validate:e2e

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-e2e
          path: |
            test-results/**
            playwright-report/**
            tmp-playwright-webserver*.log
          if-no-files-found: ignore
          retention-days: 14
