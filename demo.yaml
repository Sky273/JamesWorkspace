# Resume Converter - Demo Configuration
# =====================================
# This file describes the project for demonstration purposes

project:
  name: Resume Converter
  version: "1.5.3"
  description: Application professionnelle de gestion et d'analyse de CVs avec radar du marché de l'emploi intégré
  repository: https://github.com/your-org/resume-converter
  license: Proprietary

# Technology Stack
stack:
  frontend:
    framework: React 18
    language: TypeScript
    bundler: Vite 5
    styling: TailwindCSS
    ui_components:
      - Headless UI
      - Heroicons
      - Framer Motion
    editor: TinyMCE 8
    maps: MapLibre GL + React Map GL
    i18n: i18next
    
  backend:
    runtime: Node.js >= 18
    framework: Express.js
    language: JavaScript (ES Modules)
    
  database:
    type: PostgreSQL
    version: ">= 15"
    
  security:
    authentication: JWT (JSON Web Tokens)
    csrf_protection: Double-submit cookie pattern
    rate_limiting: express-rate-limit
    headers: Helmet
    password_hashing: bcryptjs
    
  ai_integrations:
    - provider: OpenAI
      models: [gpt-4, gpt-4-turbo, gpt-3.5-turbo]
      use_cases: [resume_analysis, skill_extraction]
    - provider: Anthropic
      models: [claude-3-opus, claude-3-sonnet]
      use_cases: [resume_analysis, skill_extraction]

# Features
features:
  resume_management:
    - name: Upload & Parsing
      description: Support for PDF, DOCX, DOC formats
      status: stable
    - name: AI Analysis
      description: Automatic extraction of skills, experiences, and education
      status: stable
    - name: ESCO Tags
      description: Automatic classification using European skills framework
      status: stable
    - name: Rich Editor
      description: Integrated TinyMCE editor for formatting
      status: stable
    - name: PDF Export
      description: Professional PDF generation
      status: stable
      
  market_radar:
    - name: Market Trends
      description: Visualization of job offers, recruitment tensions, hiring data
      status: stable
    - name: France Map
      description: Geographic distribution by region with detailed data
      status: stable
    - name: On-demand Metadata
      description: Optimized loading of details on métier click
      status: stable
    - name: Advanced Filters
      description: Filter by data type, region, métier (ROME code)
      status: stable
      
  security:
    - name: JWT Authentication
      description: Secure tokens with automatic refresh
      status: stable
    - name: CSRF Protection
      description: Double-submit cookie pattern
      status: stable
    - name: Rate Limiting
      description: Protection against abuse
      status: stable

# Services
services:
  - name: Frontend (Vite)
    port: 5173
    command: npm run dev
    description: React development server
    
  - name: Backend API
    port: 3001
    command: npm run start:proxy
    description: Express API server with authentication and market data
    
  - name: PDF Generator
    port: 3002
    command: npm run start:pdf
    description: PDF generation service using Puppeteer

# API Endpoints (Demo)
api_endpoints:
  authentication:
    - method: POST
      path: /api/auth/login
      description: User login
    - method: POST
      path: /api/auth/register
      description: User registration
    - method: POST
      path: /api/auth/refresh
      description: Refresh JWT token
    - method: POST
      path: /api/auth/logout
      description: User logout
      
  resumes:
    - method: GET
      path: /api/resumes
      description: List all resumes
    - method: POST
      path: /api/resumes
      description: Create a new resume
    - method: GET
      path: /api/resumes/:id
      description: Get resume details
    - method: PUT
      path: /api/resumes/:id
      description: Update a resume
    - method: DELETE
      path: /api/resumes/:id
      description: Delete a resume
    - method: POST
      path: /api/resumes/upload
      description: Upload resume file
      
  market_radar:
    - method: GET
      path: /api/market-radar/trends
      description: Get paginated market trends
    - method: GET
      path: /api/market-radar/trends/all
      description: Get all trends for map display
    - method: GET
      path: /api/market-radar/trends/:id/metadata
      description: Get detailed metadata for a trend
    - method: GET
      path: /api/market-radar/facts
      description: Get market facts
    - method: POST
      path: /api/market-radar/collect
      description: Trigger data collection from France Travail API
      
  health:
    - method: GET
      path: /api/health
      description: General health check
    - method: GET
      path: /api/health/memory
      description: Detailed memory statistics

# Database Schema (Main Tables)
database_schema:
  tables:
    - name: users
      description: User accounts and authentication
      key_columns: [id, email, password_hash, role, status]
      
    - name: resumes
      description: Stored CVs with metadata
      key_columns: [id, user_id, title, content, file_path, analysis_data]
      
    - name: templates
      description: CV templates
      key_columns: [id, name, content, is_default]
      
    - name: market_trends
      description: Market trends (tensions, hiring, job seekers)
      key_columns: [id, type, code_rome, region_code, value, metadata]
      
    - name: market_facts
      description: Market facts (job offers by region/métier)
      key_columns: [id, keyword, location, source, count]
      
    - name: rome_metiers
      description: ROME job classification reference
      key_columns: [code_rome, label, family_code]

# Environment Variables
environment:
  required:
    - name: DATABASE_URL
      description: PostgreSQL connection string
      example: postgresql://user:password@localhost:5432/resume_converter
      
    - name: JWT_SECRET
      description: Secret key for JWT signing (min 32 chars)
      example: your-super-secret-jwt-key-min-32-chars
      
    - name: CSRF_SECRET
      description: Secret key for CSRF protection
      example: your-csrf-secret-key
      
  optional:
    - name: OPENAI_API_KEY
      description: OpenAI API key for AI analysis
      example: sk-...
      
    - name: ANTHROPIC_API_KEY
      description: Anthropic API key for AI analysis
      example: sk-ant-...
      
    - name: FRANCE_TRAVAIL_CLIENT_ID
      description: France Travail API client ID
      
    - name: FRANCE_TRAVAIL_CLIENT_SECRET
      description: France Travail API client secret
      
    - name: VITE_API_URL
      description: Backend API URL for frontend
      example: http://localhost:3001

# Quick Start
quickstart:
  steps:
    - step: 1
      name: Install dependencies
      command: npm install
      
    - step: 2
      name: Configure environment
      command: cp .env.example .env
      note: Edit .env with your configuration
      
    - step: 3
      name: Initialize database
      commands:
        - psql -U postgres -c "CREATE DATABASE resume_converter;"
        - psql -U postgres -d resume_converter -f database/create_database.sql
        
    - step: 4
      name: Start all services
      command: npm run quickstart
      note: Starts frontend, backend, and PDF server

# Demo Scenarios
demo_scenarios:
  - name: Resume Upload & Analysis
    description: Upload a CV and see AI-powered analysis
    steps:
      - Navigate to Resumes page
      - Click "Upload CV" button
      - Select a PDF or DOCX file
      - Watch the AI analysis process
      - Review extracted skills and experiences
      
  - name: Market Radar Exploration
    description: Explore job market trends on the France map
    steps:
      - Navigate to Market Radar page
      - Select a data type (e.g., "Demandeurs d'emploi")
      - Click on a region on the map
      - Browse the list of métiers
      - Click on a métier to see detailed metadata
      
  - name: CV Editing & Export
    description: Edit a CV and export to PDF
    steps:
      - Open an existing resume
      - Use the TinyMCE editor to modify content
      - Apply a template
      - Click "Export PDF"
      - Download the formatted CV

# Performance Metrics
performance:
  frontend:
    initial_load: "< 3s"
    time_to_interactive: "< 5s"
    
  backend:
    api_response_time: "< 200ms (cached)"
    database_queries: "< 50ms (indexed)"
    
  caching:
    trends_cache: "5 minutes TTL"
    facts_cache: "5 minutes TTL"
    metiers_cache: "1 hour TTL"
    esco_cache: "1 hour TTL"

# Contact
contact:
  team: Resume Converter Team
  support: support@example.com
